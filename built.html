<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作成済みリスト - マイクラ建築ルーレット</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.4rem; margin-bottom: 6px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }
  .back { display: inline-block; color: #e94560; text-decoration: none; font-size: 0.9rem; margin-bottom: 16px; }
  .back:hover { text-decoration: underline; }

  .search-box {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .search-box input {
    flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #444;
    background: #16213e; color: #e0e0e0; font-size: 0.95rem;
  }
  .search-box input:focus { outline: none; border-color: #4caf50; }
  .search-box input::placeholder { color: #666; }

  .section { margin-bottom: 28px; }
  .section h2 { font-size: 1rem; color: #4caf50; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .section h2 .count { color: #888; font-weight: normal; }

  .built-list { list-style: none; }
  .built-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; margin-bottom: 4px; background: #16213e; border-radius: 8px;
    font-size: 0.88rem; animation: fadeIn 0.2s;
  }
  .built-list .b-info { flex: 1; }
  .built-list .b-name { font-weight: bold; }
  .built-list .b-meta { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .built-list .b-date { font-size: 0.7rem; color: #4caf50; margin-top: 2px; }
  .built-list .b-action { flex-shrink: 0; margin-left: 8px; }
  .built-list .b-action button {
    border: none; padding: 4px 12px; border-radius: 6px; font-size: 0.8rem;
    cursor: pointer; font-weight: bold; transition: background 0.2s;
  }

  .btn-remove { background: #444; color: #ccc; }
  .btn-remove:hover { background: #555; }

  .empty-msg { color: #666; font-size: 0.85rem; padding: 12px 0; }

  .actions { display: flex; gap: 8px; margin-bottom: 20px; }
  .actions button {
    font-size: 0.82rem; color: #888; background: none; border: 1px solid #444;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
  }
  .actions button:hover { border-color: #888; color: #ccc; }
  .actions button.danger { border-color: #e94560; color: #e94560; }
  .actions button.danger:hover { background: #e94560; color: #fff; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">&larr; ルーレットに戻る</a>
  <h1>&#9989; 作成済みリスト</h1>
  <p class="subtitle">作った建築の記録です</p>

  <!-- 作成済み一覧 -->
  <div class="section">
    <h2>作成済み <span class="count" id="builtCount">(0件)</span></h2>
    <div class="actions" id="builtActions" style="display:none">
      <button onclick="exportBuilt()">リストをコピー</button>
      <button class="danger" onclick="clearBuilt()">全削除</button>
    </div>
    <ul class="built-list" id="builtList"></ul>
  </div>

</div>

<script src="data.js"></script>
<script>
const rows = CSV.trim().split("\n").slice(1).map(line => {
  const m = line.match(/^([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),(.*),([^,]*)$/);
  if (!m) return null;
  return { name: m[1], category: m[2], scale: m[3], mood: m[4], difficulty: +m[5], description: m[6], tags: m[7] };
}).filter(Boolean);

function getBuilt() {
  try { return JSON.parse(localStorage.getItem("mcBuilt") || "[]"); } catch { return []; }
}
function saveBuilt(b) { localStorage.setItem("mcBuilt", JSON.stringify(b)); }

function removeBuilt(idx) {
  const built = getBuilt();
  built.splice(idx, 1);
  saveBuilt(built);
  renderBuilt();
}

function clearBuilt() {
  if (!confirm("作成済みリストを全て削除しますか？")) return;
  saveBuilt([]);
  renderBuilt();
}

function renderBuilt() {
  const built = getBuilt();
  document.getElementById("builtCount").textContent = `(${built.length}件)`;
  const list = document.getElementById("builtList");
  const actions = document.getElementById("builtActions");

  if (built.length === 0) {
    list.innerHTML = '<li class="empty-msg">作成済みリストは空です</li>';
    actions.style.display = "none";
    return;
  }

  actions.style.display = "";
  list.innerHTML = built.map((b, i) => {
    const stars = "\u2605".repeat(b.difficulty) + "\u2606".repeat(5 - b.difficulty);
    const dateStr = b.date ? `<div class="b-date">${b.date} に記録</div>` : "";
    return `<li>
      <div class="b-info">
        <div class="b-name">${b.name}</div>
        <div class="b-meta">${b.scale} / ${b.mood} / ${b.category} / ${stars}</div>
        ${dateStr}
      </div>
      <div class="b-action">
        <button class="btn-remove" onclick="removeBuilt(${i})">削除</button>
      </div>
    </li>`;
  }).join("");
}

function exportBuilt() {
  const built = getBuilt();
  const text = built.map(b => `${b.name} (${b.scale}/${b.mood})`).join("\n");
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".actions button");
    btn.textContent = "OK!";
    setTimeout(() => { btn.textContent = "リストをコピー"; }, 1200);
  });
}

renderBuilt();
</script>
</body>
</html>
